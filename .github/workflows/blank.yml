name: Infra

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  AWS_REGION: ap-northeast-1
  TF_WORKING_DIR: terraform

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create CI backend config
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > backend-ci.hcl << EOF
          bucket   = "${{ secrets.TF_STATE_BUCKET }}"
          key      = "eks/terraform.tfstate"
          region   = "${{ env.AWS_REGION }}"
          encrypt  = true
          assume_role = { role_arn = "secrets.AWS_STATE_ROLE_ARN" }
          EOF

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config=backend-ci.hcl

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_infra_role_arn: ${{ secrets.AWS_ROLE_ARN }}
        run: terraform plan -out=tfplan

      - name: Post plan summary to PR
        if: github.event_name == 'pull_request'
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          echo "### Terraform Plan 📋" >> $GITHUB_STEP_SUMMARY
          terraform show -no-color tfplan >> $GITHUB_STEP_SUMMARY

  terraform-apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Create CI backend config
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          cat > backend-ci.hcl << EOF
          bucket   = "${{ secrets.TF_STATE_BUCKET }}"
          key      = "eks/terraform.tfstate"
          region   = "${{ env.AWS_REGION }}"
          encrypt  = true
          assume_role = { role_arn = "secrets.AWS_STATE_ROLE_ARN" }
          EOF

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init -backend-config=backend-ci.hcl

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_infra_role_arn: ${{ secrets.AWS_ROLE_ARN }}
        run: terraform apply -auto-approve
